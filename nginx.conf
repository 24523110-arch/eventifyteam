server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — semua route client-side (React Router) dilayani index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache aset ber-hash dari Vite lebih lama
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
